services:
  producer:
    build: .
    container_name: hollow-producer
    ports:
      - "9080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=producer
      - HOLLOW_AWS_REGION=${HOLLOW_AWS_REGION}
      - HOLLOW_AWS_BUCKET=${HOLLOW_AWS_BUCKET}
      - HOLLOW_AWS_DYNAMODB_TABLE=${HOLLOW_AWS_DYNAMODB_TABLE}
      - HOLLOW_AWS_DATASET_ID=${HOLLOW_AWS_DATASET_ID:-movies}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  consumer:
    build: .
    container_name: hollow-consumer
    ports:
      - "9081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=consumer
      - HOLLOW_AWS_REGION=${HOLLOW_AWS_REGION}
      - HOLLOW_AWS_BUCKET=${HOLLOW_AWS_BUCKET}
      - HOLLOW_AWS_DYNAMODB_TABLE=${HOLLOW_AWS_DYNAMODB_TABLE}
      - HOLLOW_AWS_DATASET_ID=${HOLLOW_AWS_DATASET_ID:-movies}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    depends_on:
      producer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
